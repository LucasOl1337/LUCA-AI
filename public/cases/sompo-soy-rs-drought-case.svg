<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Caso 001: soja RS com restricao hidrica</title>
  <desc id="desc">Visual operacional de lavoura, talhoes priorizados e vistoria preventiva em campo.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#26322d"/>
      <stop offset="1" stop-color="#10140f"/>
    </linearGradient>
    <linearGradient id="field" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7a7446"/>
      <stop offset="0.55" stop-color="#3e5c38"/>
      <stop offset="1" stop-color="#1f3323"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="#090b08"/>
  <rect width="1200" height="360" fill="url(#sky)"/>
  <circle cx="1030" cy="104" r="74" fill="#d7b36e" opacity="0.72" filter="url(#soft)"/>
  <path d="M0 335 C180 292 315 310 470 278 C640 244 822 265 1200 220 L1200 760 L0 760 Z" fill="url(#field)"/>
  <g opacity="0.35" stroke="#d8c477" stroke-width="2">
    <path d="M-20 720 C220 580 390 460 540 300"/>
    <path d="M130 760 C325 595 510 430 680 276"/>
