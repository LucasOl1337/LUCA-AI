    <path d="M210 745 C405 588 590 430 746 274"/>
    <path d="M500 746 C630 590 770 430 970 242"/>
  </g>
  <g>
    <rect x="68" y="64" width="372" height="166" rx="8" fill="#10120f" opacity="0.94" stroke="#f4f0df" stroke-opacity="0.18"/>
    <text x="92" y="105" fill="#8ee4a8" font-family="Inter, Arial" font-size="18" font-weight="700">CASO 001</text>
    <text x="92" y="145" fill="#faf9f6" font-family="Inter, Arial" font-size="30" font-weight="700">Soja RS</text>
    <text x="92" y="184" fill="#c4c2bd" font-family="Inter, Arial" font-size="20">restricao hidrica + triagem preventiva</text>
  </g>
  <g transform="translate(714 104)">
    <rect width="386" height="252" rx="8" fill="#10120f" opacity="0.94" stroke="#f4f0df" stroke-opacity="0.18"/>
    <text x="24" y="42" fill="#8ee4a8" font-family="Inter, Arial" font-size="15" font-weight="700">FILA DE CAMPO</text>
    <g font-family="Inter, Arial" font-size="17" fill="#faf9f6">
      <text x="24" y="86">1. mapear apolice + talhao</text>
      <text x="24" y="126">2. coletar foto georreferenciada</text>
      <text x="24" y="166">3. classificar severidade</text>
      <text x="24" y="206">4. acionar vistoria preventiva</text>
    </g>
  </g>
  <g transform="translate(650 462)">
    <rect x="0" y="0" width="420" height="176" rx="8" fill="#10120f" opacity="0.92" stroke="#8ee4a8" stroke-opacity="0.32"/>
    <text x="26" y="44" fill="#8ee4a8" font-family="Inter, Arial" font-size="15" font-weight="700">DECISAO</text>
    <text x="26" y="84" fill="#faf9f6" font-family="Inter, Arial" font-size="24" font-weight="700">contato tecnico, evidencia,</text>
    <text x="26" y="118" fill="#faf9f6" font-family="Inter, Arial" font-size="24" font-weight="700">vistoria ou bloqueio tecnico</text>
    <text x="26" y="150" fill="#c4c2bd" font-family="Inter, Arial" font-size="16">sem inventar perda evitada sem carteira real</text>
